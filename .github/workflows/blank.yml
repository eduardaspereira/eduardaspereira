- name: generate-multi-source-snake-animation
        uses: Zqzqsb/MultiSourceSnake@v1.1
        with:
          # This automatically grabs your username
          GITHUB_USER: ${{ github.repository_owner }}
          
          # This uses the built-in GitHub secret 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # This defines what the files look like and where they go
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=orange
