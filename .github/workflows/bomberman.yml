name: Generate Arcade Contribution Graphs

on:
  schedule:
    # Run automatically every 24 hours
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering
  push: # Runs on every push to the main branch
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Generates the Bomberman game animation from thy grid
      - name: Generate Contribution Graph SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Target bomberman explicitly here
          games: 'bomberman'

      # Push the generated SVGs to the output branch
      - name: Push SVGs to the Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
